version: "3.9"

# ─────────────────────────────────────────────
#  Warif — Local Development Stack
#  Usage: docker compose up
# ─────────────────────────────────────────────

services:

  # ── PostgreSQL + TimescaleDB ──────────────
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: warif-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-warif}
      POSTGRES_USER: ${DB_USER:-warif_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-warif_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MQTT Broker ───────────────────────────
  mqtt:
    image: eclipse-mosquitto:2
    container_name: warif-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # ── Backend API (FastAPI) ─────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: warif-backend
    restart: unless-stopped
    env_file:
      - .env
      - backend/.env
    environment:
      - DB_HOST=db
      - MQTT_BROKER_HOST=mqtt
    ports:
      - "8010:8010"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8010 --reload

  # ── Streamlit Dashboard ───────────────────
  dashboard:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: warif-dashboard
    restart: unless-stopped
    env_file:
      - .env
      - backend/.env
    environment:
      - DB_HOST=db
    ports:
      - "8501:8501"
    volumes:
      - ./backend:/app
    depends_on:
      - backend
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

  # ── Frontend (React + Vite) ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: warif-frontend
    restart: unless-stopped
    env_file:
      - frontend/.env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

  # ── Prometheus ────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: warif-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  # ── Grafana ───────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: warif-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana:/etc/grafana/provisioning

volumes:
  db_data:
  grafana_data:
