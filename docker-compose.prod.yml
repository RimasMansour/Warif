version: "3.9"

# ─────────────────────────────────────────────
#  Warif — Production Overrides
#  Usage:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────

services:

  backend:
    restart: always
    environment:
      - DEBUG=false
    command: >
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port 8010
      --workers 4
      --no-access-log

  dashboard:
    restart: always

  frontend:
    build:
      target: prod          # uses the nginx stage in the Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    restart: always

  mqtt:
    restart: always
